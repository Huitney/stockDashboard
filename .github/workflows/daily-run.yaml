name: Daily Python Script

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Install Playwright browser
        run: |
          playwright install chromium
          playwright install-deps

      - name: Run scripts
        run: |
          for f in scripts/*.py; do
            echo "Running $f"
            python "$f"
          done

      # =========================
      # commit master
      # =========================
      - name: Commit to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/data/*

          git commit -m "update data" || echo "no changes"
          git push origin master

      # =========================
      # sync gh-pages (SAFE MODE)
      # =========================
      - name: Deploy to gh-pages
        run: |
          git fetch origin

          # 切換到 gh-pages，本地不存在就建立
          git checkout -B gh-pages origin/gh-pages || git checkout --orphan gh-page
          # 從 master 拿 data（覆蓋現有資料夾）
          git checkout master -- src/dat
          
          git add src/data
          git commit -m "sync data to gh-pages" || echo "no changes"

          git push origin gh-pages