name: Daily Python Script

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        
      - name: Install Playwright browser
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scripts
        run: |
          for f in scripts/*.py; do
            echo "Running $f"
            python "$f"
          done

      # =========================
      # commit master
      # =========================
      - name: Commit to master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add src/data/*

          git commit -m "update data" || echo "no changes"
          git push origin master

      # =========================
      # sync gh-pages (SAFE MODE)
      # =========================
      - name: Deploy to gh-pages
        run: |
          git fetch origin

          # 切換 gh-pages（沒有就建立 tracking branch）
          git checkout -B gh-pages origin/gh-pages

          # 先同步遠端（避免 rejected）
          git pull origin gh-pages --rebase || true

          # 只更新 data，不動其他檔案
          git checkout master -- src/data

          git add src/data

          git commit -m "sync data to gh-pages" || echo "no changes"

          # 再 push（保證 fast-forward）
          git push origin gh-pages